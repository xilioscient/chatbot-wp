version: '3.8'

services:
  llm-service:
    build:
      context: ./llm-service
      dockerfile: Dockerfile
    container_name: xsbot-llm
    ports:
      - "5000:5000"
    volumes:
      - ./data/vector_db:/data/vector_db
      - ./data/models:/data/models
      - ./data/documents:/data/documents
    environment:
      - MODEL_PATH=/data/models/model.gguf
      - VECTOR_DB_PATH=/data/vector_db
      - JWT_SECRET=${JWT_SECRET:-your-secret-key-change-this}
      - MAX_CONTEXT_TOKENS=2000
      - EMBEDDING_MODEL=sentence-transformers/paraphrase-multilingual-MiniLM-L12-v2
      - FALLBACK_API_PROVIDER=${FALLBACK_API_PROVIDER:-none}
      - FALLBACK_API_KEY=${FALLBACK_API_KEY:-}
      - FALLBACK_API_URL=${FALLBACK_API_URL:-}
      - LOG_LEVEL=INFO
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G
        reservations:
          cpus: '1'
          memory: 2G

volumes:
  vector_db:
    driver: local
  models:
    driver: local
  documents:
    driver: local
